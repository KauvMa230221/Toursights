<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Toursights • Profil</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="index.html">
      <img src="Shikane-Logo.png" alt="Logo" />
      <span>Toursights</span>
    </a>
    <nav>
      <ul>
        <li><a href="index.html">Startseite</a></li>
        <li><a href="stationen.html">Module</a></li>
        <li><a href="links.html">Links</a></li>
        <li><a href="map.html">Map</a></li>
        <li><a href="fortschritt.html">Fortschritt</a></li>
        <li><a class="active" href="profil.html">Profil</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="wrap">
  <h1>Profil / Login</h1>

  <section class="grid-2">
    <!-- Login -->
    <div class="card">
      <h2>Login</h2>
      <label>Benutzername
        <input id="loginUser" type="text">
      </label>
      <label>Passwort
        <input id="loginPass" type="password">
      </label>
      <button id="loginBtn" class="btn">Einloggen</button>
      <p id="loginMsg" class="muted"></p>
    </div>

    <!-- Registrierung -->
    <div class="card">
      <h2>Registrieren</h2>
      <label>Benutzername
        <input id="regUser" type="text">
      </label>
      <label>Passwort
        <input id="regPass" type="password">
      </label>
      <label>Rolle
        <select id="regRole">
          <option value="schueler">Schüler</option>
          <option value="lehrer">Lehrer</option>
          <option value="admin">Admin</option>
        </select>
      </label>
      <label>Schule
        <input id="regSchool" type="text">
      </label>
      <label>Klasse
        <input id="regClass" type="text" placeholder="z.B. 3AHIT">
      </label>
      <button id="regBtn" class="btn">Registrieren</button>
      <p id="regMsg" class="muted"></p>
    </div>
  </section>

  <section class="card" id="meBox" style="display:none;">
    <h2>Angemeldet als</h2>
    <p><strong id="meName"></strong> (<span id="meRole"></span>)</p>
    <p>Schule: <span id="meSchool"></span></p>
    <p>Klasse: <span id="meClass"></span></p>
    <button id="logoutBtn" class="btn btn-ghost">Logout</button>

    <div id="adminBox" style="margin-top:1rem; display:none;">
      <h3>Admin: Benutzerliste</h3>
      <pre id="adminUsers" class="muted" style="max-height:200px;overflow:auto;"></pre>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="wrap">
    <p class="muted">© <span id="year"></span> Toursights</p>
  </div>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

async function api(action, payload) {
  const res = await fetch('api.php?action=' + encodeURIComponent(action), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: payload ? JSON.stringify(payload) : null
  });
  return res.json();
}

async function loadMe() {
  const res = await fetch('api.php?action=me');
  const data = await res.json();
  const box = document.getElementById('meBox');
  if (!data.user) {
    box.style.display = 'none';
    return;
  }
  box.style.display = 'block';
  document.getElementById('meName').textContent = data.user.username;
  document.getElementById('meRole').textContent = data.user.role;
  document.getElementById('meSchool').textContent = data.user.school || '-';
  document.getElementById('meClass').textContent = data.user.class || '-';

  if (data.user.role === 'admin') {
    document.getElementById('adminBox').style.display = 'block';
    const uRes = await fetch('api.php?action=admin_users');
    const uData = await uRes.json();
    document.getElementById('adminUsers').textContent = JSON.stringify(uData.users, null, 2);
  }

  /**
   * if(data.user.role !== 'admin') {
    document.getElementById('adminBox').style.display = 'none';
  }
  \*/

  
}
document.getElementById('loginBtn').addEventListener('click', async () => {
  const username = loginUser.value;
  const password = loginPass.value;
  const res = await api('login', {username,password});
  const msg = document.getElementById('loginMsg');
  if (res.error) {
    msg.textContent = res.error;
  } else {
    msg.textContent = 'Login erfolgreich – du kannst jetzt die Seiten nutzen.';
    await loadMe();
    // Optional: zurück zur Startseite
    // window.location.href = 'index.html';
  }
});

document.getElementById('regBtn').addEventListener('click', async () => {
  const payload = {
    username: regUser.value,
    password: regPass.value,
    role: regRole.value,
    school: regSchool.value,
    class: regClass.value
  };
  const res = await api('register', payload);
  const msg = document.getElementById('regMsg');
  if (res.error) {
    msg.textContent = res.error;
  } else {
    msg.textContent = 'Registrierung erfolgreich – jetzt kannst du dich einloggen.';
  }
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await api('logout');
  window.location.reload();
});

loadMe();
</script>
</body>
</html>
