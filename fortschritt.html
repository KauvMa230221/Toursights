<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Toursights • Fortschritt</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Header / Navigation -->
  <header class="site-header">
    <div class="wrap">
      <div class="nav">
        <!-- Brand / Logo -->
        <a href="index.html" class="brand">
          <!-- Optional logo image -->
          <!-- <img src="logo.png" alt="TourSights Logo"> -->
          <span>TourSights</span>
        </a>

        <!-- Mobile menu button -->
        <button class="menu-btn" aria-label="Menü öffnen" aria-expanded="false">
          ☰
        </button>

        <!-- Main navigation -->
        <nav class="mainnav" id="mainnav">
          <ul>
            <li><a class="active" href="index.html">Startseite</a></li>
            <li><a href="stationen.html">Module</a></li>
            <li><a href="links.html">Links</a></li>
            <li><a href="map.html">Map</a></li>
            <li><a href="fortschritt.html">Fortschritt</a></li>
            <li><a href="profil.html">Profil</a></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

<main class="wrap">
<h1>Dein Fortschritt</h1>

<div class="card">
  <h2>Module / Quiz-Stationen</h2>

  <p>Station 1 Punkte:
    <strong id="s1">0</strong> / 3
  </p>

  <p>Station 2 Punkte:
    <strong id="s2">0</strong> / 3
  </p>

  <p>Station 3 Punkte:
    <strong id="s3">0</strong> / 3
  </p>

  <hr>

  <h2>Reise Statistik</h2>

  <p>Gesamt-Kilometer:
    <strong id="gesamtKm">0.00</strong> km
  </p>
</div>
</main>

<footer class="site-footer">
<div class="wrap">
<p class="muted">© <span id="year"></span> Toursights</p>
</div>
</footer>

<script>
// Jahr im Footer
document.getElementById("year").textContent = new Date().getFullYear();

// Station-Punkte laden
document.getElementById("s1").textContent =
  localStorage.getItem("station1_score") || "0";

document.getElementById("s2").textContent =
  localStorage.getItem("station2_score") || "0";

document.getElementById("s3").textContent =
  localStorage.getItem("station3_score") || "0";

// Kilometer laden
document.getElementById("gesamtKm").textContent =
  localStorage.getItem("gesamtKM") || "0.00";
</script>

</body>
</html>
