<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>TourSights – Station 1 Digital Studio Labor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="station1">
  <header class="ts-header">
    <div class="ts-logo">
      <span class="ts-logo-icon">📍</span>
      <span class="ts-logo-text">TourSights</span>
    </div>
    <nav class="ts-nav">
      <a href="index.html" data-page-link="home">Startseite</a>
      <a href="modules.html" data-page-link="modules">Module</a>
      <a href="links.html" data-page-link="links">Links</a>
      <a href="map.html" data-page-link="map">Map</a>
      <a href="progress.html" data-page-link="progress">Fortschritt</a>
      <a href="profile.html" data-page-link="profile">Profil</a>
    </nav>
  </header>

  <main class="ts-main">
    <section class="ts-card ts-card-wide ts-animate-up">
      <h1>Toursights – Station 1 • Digital Studio Labor</h1>
    </section>

    <section class="ts-card ts-card-wide ts-animate-up">
      <h2>Video</h2>
      <video controls class="ts-video">
        <source src="" type="video/mp4" />
        Dein Browser unterstützt das Video-Tag nicht.
      </video>
    </section>

    <section class="ts-card ts-card-wide ts-animate-up" id="station1-quiz">
      <h2>Fragen</h2>
      <form id="station1-form">
        <div class="ts-question">
          <label>
            <span>1. Was ist eine Möglichkeit für artificial Intelligence?</span>
            <input type="text" name="answer-1" placeholder="Antwort hier..." />
          </label>
          <p class="ts-feedback" data-feedback-for="answer-1"></p>
        </div>

        <div class="ts-question">
          <label>
            <span>2. Von welcher Universität wird „Digital Network of conspiracy“ durchgeführt?</span>
            <input type="text" name="answer-2" placeholder="Antwort hier..." />
          </label>
          <p class="ts-feedback" data-feedback-for="answer-2"></p>
        </div>

        <div class="ts-question">
          <label>
            <span>3. Was ist kein Signalwort?</span>
            <input type="text" name="answer-3" placeholder="Antwort hier..." />
          </label>
          <p class="ts-feedback" data-feedback-for="answer-3"></p>
        </div>

        <button type="submit" class="ts-btn ts-btn-primary">Auswerten</button>
        <p id="station1-score-message" class="ts-form-message"></p>
      </form>
    </section>
  </main>

  <footer class="ts-footer">
    <p>© 2025 TourSights · Station 1</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
