<body>
  <header class="site-header">
    <div class="wrap nav">

    <section class="hero-box">

    <section class="section">

        <div class="card">

      </div>

      
        <h2>Fragen</h2>

        <label for="q1">1. Was ist eine Möglichkeit für artificial Intelligence?</label>

        <input id="q3" type="text" placeholder="Antwort hier..." />
        <output id="q3o"></output>
      </div>

      

      <div class="actions">
        <button id="checkBtn" class="btn">Auswerten</button>
        <button id="resetBtn" class="btn btn-ghost" type="button">Zurücksetzen</button>
        <div id="score" class="score"></div>
      </div>

      <div class="actions">
        <a class="btn btn-link" href="station2.html">Weiter zu Station 2</a>
      </div>
